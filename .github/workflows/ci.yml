name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Verify dist/ is up to date
        run: |
          if [[ -n "$(git status dist/ --porcelain)" ]]; then
            echo "dist/ is not up to date. Run 'npm run build' and commit the result."
            git diff dist/
            exit 1
          fi
